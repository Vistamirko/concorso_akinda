name: S3 Data Sync

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: AWS_ACCESS_KEY_ID
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Force Upload to S3
      run: |
        aws s3 cp src/data/ s3://${{ secrets.AWS_S3_BUCKET }}/data/ --recursive --cache-control "max-age=0,no-cache,no-store,must-revalidate"

    - name: Apply Security Policy (Referer Restriction)
      run: |
        aws s3api put-bucket-policy --bucket ${{ secrets.AWS_S3_BUCKET }} --policy file://.github/workflows/bucket-policy.json
